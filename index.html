<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestion des Produits</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>📦 Gestion des Produits</h1>


<div id="userInfo">
Non connecté
</div>


<button onclick="connexionGoogle()">
Connexion Google
</button>


<button onclick="deconnexionGoogle()">
Déconnexion
</button>




<div class="formulaire">


<input 
type="text" 
id="nom" 
placeholder="Nom du produit">


<input 
type="number" 
id="prixGros" 
placeholder="Prix en gros">


<input 
type="number" 
id="quantite" 
placeholder="Quantité">


<input 
type="number" 
id="prixRevente" 
placeholder="Prix de revente unitaire">



<button onclick="ajouterProduit()">
Ajouter le produit
</button>


</div>





<!-- TABLEAU DE BORD -->

<div class="dashboard">


<div class="card">

<h3>📦 Produits</h3>

<span id="nbProduits">
0
</span>

</div>



<div class="card">

<h3>💰 Bénéfice Total</h3>

<span id="beneficeTotal">
0 FCFA
</span>

</div>



<div class="card">

<h3>📅 Bénéfice Aujourd'hui</h3>

<span id="beneficeJour">
0 FCFA
</span>

</div>



<div class="card">

<h3>📆 Bénéfice du Mois</h3>

<span id="beneficeMois">
0 FCFA
</span>

</div>



</div>







<table>


<thead>


<tr>

<th>Produit</th>

<th>Prix Gros</th>

<th>Quantité</th>

<th>Prix Unitaire</th>

<th>Prix Revente</th>

<th>Bénéfice / Perte</th>

<th>Action</th>


</tr>


</thead>



<tbody id="tableauProduits">

</tbody>


</table>





<!-- HISTORIQUE DES ACTIONS -->


<div class="historique">


<h2>📜 Historique des actions</h2>



<table>


<thead>


<tr>

<th>Action</th>

<th>Produit</th>

<th>Date</th>


</tr>


</thead>



<tbody id="tableauHistorique">


</tbody>



</table>


</div>




</div>





<script type="module" src="firebase.js"></script>

<script type="module" src="script.js"></script>



</body>

</html>
