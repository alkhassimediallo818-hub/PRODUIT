<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Créer votre profil</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="profil-container">


    <div class="profil-card">


        <div class="profil-logo">
            👤
        </div>


        <h1>
            Créer votre profil
        </h1>


        <p>
            Choisissez un nom d'utilisateur pour continuer.
        </p>



        <div class="profil-form">


            <input 
            type="text"
            id="nomUtilisateur"
            placeholder="Nom d'utilisateur"
            maxlength="20"
            >



            <button 
            id="btnCreerProfil">

                Continuer

            </button>


        </div>



        <p 
        id="messageProfil"
        class="message">

        </p>



    </div>


</div>




<script type="module" src="./JS/profil.js"></script>


</body>

</html>
